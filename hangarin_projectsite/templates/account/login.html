{% load socialaccount %} 
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Hangarin | Sign In</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f3f4f6; /* Soft light gray */
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            text-align: center;
        }
        .icon-circle {
            width: 50px;
            height: 50px;
            background-color: #dcfce7; /* Soft green success circle */
            color: #16a34a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
        }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: white;
            color: #374151;
            font-weight: 500;
            text-decoration: none;
            transition: 0.2s;
        }
        .google-btn:hover { background-color: #f9fafb; border-color: #d1d5db; color: #111827; }
        .google-btn img { width: 18px; margin-right: 10px; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #9ca3af;
            font-size: 0.8rem;
            margin: 25px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e5e7eb;
            background-color: #ffffff;
            margin-bottom: 15px;
        }
        .btn-primary-full {
            background-color: #0d6efd; /* Your theme blue */
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary-full:hover { background-color: #0b5ed7; }
        .footer-link { font-size: 0.9rem; color: #6b7280; margin-top: 25px; }
        .footer-link a { color: #0d6efd; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="fw-bold mb-1" style="color: #111827;">Hangarin</h2>
        <p class="text-muted mb-4" style="font-size: 0.9rem;">Sign in to manage your tasks</p>

        <a href="{% provider_login_url 'google' %}" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Continue with Google
        </a>

        <form method="post" action="{% url 'account_login' %}">
            {% csrf_token %}
            <input type="text" name="login" class="form-control" placeholder="Enter your username or email" required>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            
            <button type="submit" class="btn-primary-full mt-2">Sign In</button>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="{% url 'account_signup' %}">Sign up</a>
        </div>
    </div>
</body>
</html>

{% load static %} <!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Hangarin Task Manager{% endblock %}</title> <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"> <link rel="stylesheet" href="{% static 'css/ready.css' %}"> <link rel="stylesheet" href="{% static 'css/demo.css' %}"> </head>
<body>
    <div class="wrapper">
        <div class="sidebar">
            <ul class="nav">
                <li class="nav-item">
                    <a href="{% url 'home' %}">
                        <i class="la la-dashboard"></i>
                        <p>Dashboard</p> </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'task-list' %}">
                        <i class="la la-table"></i>
                        <p>My Tasks</p>
                    </a>
                </li>
            </ul>
        </div>

        <div class="main-panel"> {% block content %}
            {% endblock %} </div>
    </div>

    <script src="{% static 'js/core/jquery.3.2.1.min.js' %}"></script> <script src="{% static 'js/core/bootstrap.min.js' %}"></script> </body>
</html>

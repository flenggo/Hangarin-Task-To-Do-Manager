{% extends 'base.html' %} 
{% load static %} 
{% block content %}
<div class="content">
    <div class="container-fluid">
        <h4 class="page-title">Dashboard</h4> <div class="row">
            <div class="col-md-6">
                <div class="card card-stats card-warning"> <div class="card-body">
                        <p class="card-category">Total Tasks</p> <h4 class="card-title">{{ total_tasks }}</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card card-stats card-danger"> <div class="card-body">
                        <p class="card-category">Pending Tasks</p> <h4 class="card-title">{{ pending_tasks }}</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

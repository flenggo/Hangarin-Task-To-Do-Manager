{% extends 'base.html' %}
{% block content %}
<div class="content">
    <div class="container-fluid">
        <h4 class="page-title">Tasks</h4>
        <div class="card">
            <div class="card-header">
                <div class="card-title">{% if object %} Update Task {% else %} Add New Task {% endif %}</div>
            </div>
            <div class="card-body col-md-6">
                <form action="" method="post" novalidate>
                    {% csrf_token %}
                    {% include 'includes/form.html' %} <button type="submit" class="btn btn-primary mt-3">Submit</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
